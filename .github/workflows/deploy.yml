name: CI/CD for Vite React

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  deployments: write 

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      dist-path: ${{ steps.build.outputs.dist-path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Build project
        id: build
        run: |
          pnpm run build
          echo "dist-path=dist" >> $GITHUB_OUTPUT

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Install Wrangler v4
        run: npm install -g wrangler@^4

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PUBLISH_OUTPUT=$(npx wrangler pages publish dist \
            --project-name="react-tailwind-ad-agency" \
            --branch="main" --format=json)
          echo "$PUBLISH_OUTPUT" > publish.json
          DEPLOY_URL=$(jq -r '.url' publish.json)
          echo "deploy-url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Create GitHub deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              required_contexts: [],
              environment: 'Production',
              auto_merge: false,
              description: 'Deployed to Cloudflare Pages'
            });
            core.info(`GitHub Deployment created: ${deployment.data.id}`);

      - name: Comment deployed URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const url = "${{ steps.deploy.outputs.deploy-url }}";
            const pr_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              body: `🚀 Deployed preview: [${url}](${url})`
            });
